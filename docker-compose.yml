version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: txn_ranker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: txnuser
      POSTGRES_PASSWORD: txnpass
      POSTGRES_DB: txn_ranker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txnuser -d txn_ranker"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI + Uvicorn) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: txn_ranker_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://txnuser:txnpass@postgres:5432/txn_ranker"
      ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
